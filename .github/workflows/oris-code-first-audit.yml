name: ORIS Code First Audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python sources
        run: |
          python -m compileall -q \
            scripts/dev_employee_openclaw_enable \
            scripts/dev_employee_quality \
            scripts/oris_free_mesh_api.py \
            scripts/oris_infer.py \
            scripts/runtime_execute.py \
            oris_vnext/free_mesh_compat.py \
            oris_vnext/free_mesh_http.py \
            oris_vnext/free_mesh_inference.py \
            oris_vnext/infer_refresh.py \
            oris_vnext/openai_chat_contract.py \
            oris_vnext/runtime_execution_engine.py \
            oris_vnext/runtime_execution_state.py \
            oris_vnext/runtime_provider_client.py \
            tests/test_free_mesh_tool_calling.py \
            tests/test_free_mesh_protocol.py
      - name: Validate shell syntax
        run: |
          bash -n scripts/dev_employee_audit_openclaw_enablement_code.sh
          bash -n scripts/dev_employee_activate_free_mesh_tool_calling_and_diagnose.sh
          bash -n scripts/dev_employee_diagnose_openclaw_effective_tool_surface.sh
          bash -n scripts/dev_employee_diagnose_openclaw_model_tool_call_routing.sh
      - name: Run pure automatic selftests
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python -c 'from scripts.dev_employee_openclaw_enable.selftest import run_selftests; assert run_selftests()'
      - name: Run Free Mesh tool-calling tests
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python tests/test_free_mesh_tool_calling.py
      - name: Run Free Mesh protocol tests
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python tests/test_free_mesh_protocol.py
      - name: Run static repository audit
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python -c 'import json; from pathlib import Path; from scripts.dev_employee_openclaw_enable.engineering_scan import scan_repository_sources; report=scan_repository_sources(Path.cwd()); payload=json.dumps(report, sort_keys=True, indent=2); Path("code-first-audit.json").write_text(payload+"\n", encoding="utf-8"); print(payload); raise SystemExit(0 if report["ok"] else 2)'
      - name: Upload static audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oris-code-first-audit
          path: code-first-audit.json
          if-no-files-found: error
          retention-days: 1
