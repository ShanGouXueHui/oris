name: ORIS Code First Audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile active Python sources
        run: |
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python - <<'PY'
          import py_compile
          from pathlib import Path
          from scripts.dev_employee_openclaw_enable.code_audit_scope import architecture_paths, load_code_audit_scope
          root = Path.cwd()
          for path in architecture_paths(root, load_code_audit_scope(root)):
              py_compile.compile(str(path), doraise=True)
          PY
      - name: Validate active shell syntax
        run: |
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python - <<'PY'
          import subprocess
          from pathlib import Path
          from scripts.dev_employee_openclaw_enable.code_audit_scope import load_code_audit_scope, source_paths
          from scripts.dev_employee_quality.policy import load_policy
          root = Path.cwd()
          scope = load_code_audit_scope(root)
          policy = load_policy(root)
          for relative in source_paths(root, scope, policy.source_extensions):
              if relative.suffix == ".sh":
                  subprocess.run(["bash", "-n", str(root / relative)], check=True)
          PY
      - name: Run pure automatic selftests
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python -c 'from scripts.dev_employee_openclaw_enable.selftest import run_selftests; assert run_selftests()'
      - name: Run Free Mesh tool-calling tests
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python tests/test_free_mesh_tool_calling.py
      - name: Run Free Mesh protocol tests
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python tests/test_free_mesh_protocol.py
      - name: Run direct entrypoint bootstrap regression
        run: PYTHONDONTWRITEBYTECODE=1 python tests/test_script_entrypoint_bootstrap.py
      - name: Run typed write offline tests
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=scripts:. python tests/test_dev_employee_typed_write_offline.py
      - name: Run static repository audit
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python -c 'import json; from pathlib import Path; from scripts.dev_employee_openclaw_enable.engineering_scan import scan_repository_sources; report=scan_repository_sources(Path.cwd()); payload=json.dumps(report, sort_keys=True, indent=2); Path("code-first-audit.json").write_text(payload+"\n", encoding="utf-8"); print(payload); raise SystemExit(0 if report["ok"] else 2)'
      - name: Upload static audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oris-code-first-audit
          path: code-first-audit.json
          if-no-files-found: error
          retention-days: 1
      - name: Build temporary active-source snapshot
        if: always()
        run: |
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python - <<'PY'
          import shutil
          from pathlib import Path
          from scripts.dev_employee_openclaw_enable.code_audit_scope import load_code_audit_scope, source_paths
          from scripts.dev_employee_quality.policy import load_policy
          root = Path.cwd()
          output = root / "active-source-snapshot"
          scope = load_code_audit_scope(root)
          policy = load_policy(root)
          for relative in source_paths(root, scope, policy.source_extensions):
              target = output / relative
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(root / relative, target)
          PY
      - name: Upload temporary active-source snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oris-active-source-snapshot
          path: active-source-snapshot
          if-no-files-found: error
          retention-days: 1
